<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0f0f; --surface:#181818; --surface2:#222; --border:#2e2e2e; --border2:#3a3a3a;
  --text:#e8e8e8; --text2:#888; --text3:#555;
  --accent:#c8f04a; --accent-dim:rgba(200,240,74,.12);
  --red:#ff5252; --red-dim:rgba(255,82,82,.12);
  --amber:#ffb347; --amber-dim:rgba(255,179,71,.12);
  --blue:#5bb8ff; --blue-dim:rgba(91,184,255,.12);
  --teal:#4cd9ac;
  --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
  --r:4px; --r2:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh}
.layout{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{display:flex;flex-direction:column;min-height:100vh;overflow:hidden}
.sidebar-header{padding:24px 20px 16px;border-bottom:1px solid var(--border)}
.logo{font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:.08em;color:var(--accent)}
.logo-sub{font-size:11px;color:var(--text3);margin-top:2px;letter-spacing:.04em}
.nav{padding:12px 0;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;font-size:13px;color:var(--text2);cursor:pointer;border-left:2px solid transparent;transition:all .15s;user-select:none}
.nav-item:hover{color:var(--text);background:var(--surface2)}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:var(--accent-dim)}
.nav-icon{font-family:var(--mono);font-size:14px;width:18px;text-align:center}
.sidebar-footer{padding:16px 20px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);font-family:var(--mono)}
.sync-status{display:flex;align-items:center;gap:7px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0}
.sync-dot.ok{background:var(--accent);box-shadow:0 0 6px var(--accent)}
.sync-dot.loading{background:var(--amber);animation:pulse .8s infinite}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.topbar{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
.page-title{font-size:17px;font-weight:500}
.page-sub{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:3px}
.topbar-actions{display:flex;gap:8px;flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;font-size:12px;font-family:var(--sans);border-radius:var(--r);border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--text3);color:var(--text)}
.btn-primary{background:var(--accent);color:#0f0f0f;border-color:var(--accent);font-weight:500}
.btn-primary:hover{background:#d4f55c}
.btn-danger{border-color:rgba(255,82,82,.4);color:var(--red)}
.btn-danger:hover{background:var(--red-dim)}
.btn-sm{padding:5px 10px;font-size:11px}
.content{padding:24px 28px;flex:1;overflow-y:auto}
.vehicles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}
.veh-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.veh-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.veh-card.ok::before{background:var(--accent)}
.veh-card.warn::before{background:var(--amber)}
.veh-card.bad::before{background:var(--red)}
.veh-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.veh-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.veh-name{font-size:15px;font-weight:500;margin-bottom:3px}
.veh-patent{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:.1em}
.veh-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.stat-val{font-family:var(--mono);font-size:13px;font-weight:500}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:2px;font-size:10px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;font-family:var(--mono)}
.badge-ok{background:rgba(200,240,74,.15);color:var(--accent);border:1px solid rgba(200,240,74,.3)}
.badge-warn{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(255,179,71,.3)}
.badge-bad{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,82,82,.3)}
.badge-blue{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(91,184,255,.3)}
.badge-gray{background:rgba(80,80,80,.2);color:var(--text2);border:1px solid var(--border)}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead{background:var(--surface2)}
th{padding:10px 16px;font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;text-align:left;font-family:var(--mono);border-bottom:1px solid var(--border)}
td{padding:11px 16px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.td-mono{font-family:var(--mono);font-size:12px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px}
.scard-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;font-family:var(--mono);margin-bottom:8px}
.scard-val{font-size:26px;font-weight:300;font-family:var(--mono);line-height:1}
.scard-sub{font-size:11px;color:var(--text3);margin-top:5px}
.bar-chart{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:20px;margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.bar-row:last-child{margin-bottom:0}
.bar-label{font-size:12px;color:var(--text2);width:130px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex-shrink:0}
.bar-track{flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .4s ease}
.bar-val{font-family:var(--mono);font-size:11px;color:var(--text3);width:90px;text-align:right;flex-shrink:0}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(3px)}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);width:100%;max-width:460px;max-height:90vh;overflow-y:auto}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1}
.modal-title{font-size:15px;font-weight:500}
.modal-body{padding:20px 24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.form-row{margin-bottom:14px}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
label{display:block;font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;font-family:var(--mono)}
input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--sans);font-size:13px;padding:8px 12px;border-radius:var(--r);outline:none;transition:border-color .15s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
select option{background:var(--surface2);color:var(--text)}
textarea{resize:vertical;min-height:72px}
.check-row{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.check-row input[type=checkbox]{width:15px;height:15px;accent-color:var(--accent);flex-shrink:0;cursor:pointer}
.check-row label{font-size:13px;color:var(--text2);text-transform:none;letter-spacing:0;font-family:var(--sans);margin:0;cursor:pointer}
.detail-header{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:20px 24px;margin-bottom:16px}
.detail-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}
.detail-title{font-size:20px;font-weight:500;margin-bottom:4px}
.detail-meta{font-size:11px;color:var(--text3);font-family:var(--mono)}
.detail-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.dstat{background:var(--surface2);border-radius:var(--r);padding:10px 12px}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-label{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;font-family:var(--mono)}
.tl-item{display:flex;gap:14px;padding-bottom:14px;position:relative}
.tl-item:not(:last-child)::after{content:'';position:absolute;left:7px;top:18px;bottom:0;width:1px;background:var(--border)}
.tl-dot{width:15px;height:15px;border-radius:50%;border:2px solid var(--bg);flex-shrink:0;margin-top:2px}
.tl-content{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:11px 14px}
.tl-meta{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
.tl-date{font-family:var(--mono);font-size:11px;color:var(--text3)}
.tl-desc{font-size:13px;color:var(--text2);margin-top:3px;line-height:1.5}
.tl-actions{display:flex;gap:6px;margin-top:8px}
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-bar input,.filter-bar select{width:auto;flex:1;min-width:140px;max-width:200px}
.loading{display:flex;align-items:center;justify-content:center;padding:64px;color:var(--text3);font-family:var(--mono);font-size:12px;gap:10px}
.spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:56px 24px;color:var(--text3);font-family:var(--mono);font-size:12px}
.empty-title{font-size:14px;margin-bottom:8px;color:var(--text2);font-family:var(--sans)}
.toast-wrap{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:200;pointer-events:none}
.toast{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r2);padding:10px 16px;font-size:13px;display:flex;align-items:center;gap:8px;animation:toastIn .2s ease;pointer-events:auto}
.toast.ok{border-left:3px solid var(--accent)}
.toast.error{border-left:3px solid var(--red)}
@keyframes toastIn{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.config-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:20px 24px;margin-bottom:12px}
.config-title{font-size:14px;font-weight:500;margin-bottom:4px}
.config-sub{font-size:12px;color:var(--text3);margin-bottom:16px;line-height:1.6}
.step{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.step:last-child{border-bottom:none}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--accent-dim);border:1px solid rgba(200,240,74,.3);display:flex;align-items:center;justify-content:center;font-size:11px;font-family:var(--mono);color:var(--accent);flex-shrink:0;margin-top:1px}
.step-text{font-size:13px;color:var(--text2);line-height:1.6}
.step-text code{font-family:var(--mono);font-size:11px;background:var(--surface2);padding:1px 6px;border-radius:3px;color:var(--accent)}
.step-text a{color:var(--accent)}
.alert{border-radius:var(--r);padding:10px 14px;font-size:12px;margin-bottom:14px;border-left:3px solid;line-height:1.5}
.alert-warn{background:var(--amber-dim);border-color:var(--amber);color:var(--amber)}
.alert-ok{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
@media(max-width:640px){
  .layout{grid-template-columns:1fr}
  .sidebar{display:none}
  .content{padding:16px}
  .topbar{padding:14px 16px}
  .detail-stats{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">FLEET MGR</div>
      <div class="logo-sub">Gestión de flota</div>
    </div>
    <nav class="nav">
      <div class="nav-item active" onclick="navigate('vehicles')"><span class="nav-icon">◈</span>Vehículos</div>
      <div class="nav-item" onclick="navigate('events')"><span class="nav-icon">◎</span>Registros</div>
      <div class="nav-item" onclick="navigate('dashboard')"><span class="nav-icon">◫</span>Resumen</div>
      <div class="nav-item" onclick="navigate('config')"><span class="nav-icon">◧</span>Configuración</div>
    </nav>
    <div class="sidebar-footer">
      <div class="sync-status"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">Sin conectar</span></div>
      <div style="margin-top:6px;font-size:10px;color:var(--text3)" id="sync-time"></div>
    </div>
  </aside>
  <div class="main">
    <div class="topbar">
      <div>
        <div class="page-title" id="page-title">Vehículos</div>
        <div class="page-sub" id="page-sub">—</div>
      </div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div class="content" id="content"><div class="loading"><div class="spinner"></div>Iniciando...</div></div>
  </div>
</div>
<div class="toast-wrap" id="toast-wrap"></div>
<div id="modal-root"></div>

<script>
const CFG_KEY='fleetmgr_api_url';
let API_URL=localStorage.getItem(CFG_KEY)||'';
let S={vehicles:[],events:[],page:'vehicles',detail:null};

const ET={
  mantenimiento:{label:'Mantenimiento',color:'#c8f04a',bc:'badge-ok'},
  averia:{label:'Avería / Falla',color:'#ff5252',bc:'badge-bad'},
  revision:{label:'Revisión / VTV',color:'#5bb8ff',bc:'badge-blue'},
  combustible:{label:'Combustible',color:'#ffb347',bc:'badge-warn'},
  km:{label:'Actualiz. km',color:'#555',bc:'badge-gray'},
};
const VT={auto:'🚗',pickup:'🚚',van:'🚐',camion:'🚛',moto:'🏍️'};
const ST={ok:{label:'Al día',cls:'badge-ok'},warn:{label:'Atención',cls:'badge-warn'},bad:{label:'Urgente',cls:'badge-bad'}};

async function api(params){
  if(!API_URL){navigate('config');toast('Configurá la URL del backend primero','error');return null;}
  setSyncState('loading');
  try{
    const url=API_URL+'?'+new URLSearchParams(params);
    const res=await fetch(url);
    const json=await res.json();
    if(json.error){setSyncState('error');toast('Error: '+json.error,'error');return null;}
    setSyncState('ok');
    return json;
  }catch(e){setSyncState('error');toast('Error de conexión con Google Sheets','error');return null;}
}

async function loadAll(){
  if(!API_URL){render();return;}
  const data=await api({action:'getAll'});
  if(data){
    S.vehicles=(data.vehicles||[]).filter(v=>v&&v.id);
    S.events=(data.events||[]).filter(e=>e&&e.id);
    document.getElementById('sync-time').textContent='Actualizado '+new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  }
  render();
}

function setSyncState(s){
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-label');
  dot.className='sync-dot '+s;
  lbl.textContent=s==='ok'?'Conectado':s==='loading'?'Sincronizando...':'Error de conexión';
}

function toast(msg,type='ok'){
  const w=document.getElementById('toast-wrap');
  const t=document.createElement('div');
  t.className='toast '+type;
  t.innerHTML=`<span>${type==='ok'?'✓':'✕'}</span><span>${msg}</span>`;
  w.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},3000);
}

function navigate(page,detail){
  S.page=page;S.detail=detail||null;
  document.querySelectorAll('.nav-item').forEach((el,i)=>{
    el.classList.toggle('active',['vehicles','events','dashboard','config'][i]===page);
  });
  render();
}

function render(){
  const v=S.detail?S.vehicles.find(x=>String(x.id)===String(S.detail)):null;
  document.getElementById('page-title').textContent=v?v.nombre:{vehicles:'Vehículos',events:'Registros',dashboard:'Resumen',config:'Configuración'}[S.page];
  const actions=document.getElementById('topbar-actions');
  const content=document.getElementById('content');

  if(S.detail){
    document.getElementById('page-sub').textContent=v?`${v.patente||''} · ${v.anio||''}`:'';
    actions.innerHTML=`<button class="btn btn-sm" onclick="navigate('vehicles')">← Volver</button>
      <button class="btn btn-sm" onclick="openVehicleModal('${S.detail}')">Editar</button>
      <button class="btn btn-sm btn-primary" onclick="openEventModal(null,'${S.detail}')">+ Registro</button>`;
    renderDetail(content,v);return;
  }

  document.getElementById('page-sub').textContent={
    vehicles:`${S.vehicles.length} unidades registradas`,
    events:`${S.events.length} registros totales`,
    dashboard:'Estadísticas generales',config:'Conexión con Google Sheets'
  }[S.page]||'';

  if(S.page==='vehicles'){
    actions.innerHTML=`<button class="btn btn-sm" onclick="loadAll()">↻</button><button class="btn btn-sm btn-primary" onclick="openVehicleModal()">+ Vehículo</button>`;
    renderVehicles(content);
  }else if(S.page==='events'){
    actions.innerHTML=`<button class="btn btn-sm" onclick="loadAll()">↻</button><button class="btn btn-sm btn-primary" onclick="openEventModal()">+ Registro</button>`;
    renderEvents(content);
  }else if(S.page==='dashboard'){
    actions.innerHTML=`<button class="btn btn-sm" onclick="loadAll()">↻ Actualizar</button>`;
    renderDashboard(content);
  }else if(S.page==='config'){
    actions.innerHTML='';renderConfig(content);
  }
}

// ── Vehicles ──────────────────────────────────────────────────
function renderVehicles(el){
  if(!API_URL){el.innerHTML=notConfigured();return;}
  if(!S.vehicles.length){el.innerHTML=`<div class="empty"><div class="empty-title">Sin vehículos registrados</div>Usá el botón "+ Vehículo" para agregar el primero</div>`;return;}
  el.innerHTML=`<div class="vehicles-grid">${S.vehicles.map(vCard).join('')}</div>`;
}

function vCard(v){
  const evs=S.events.filter(e=>String(e.vehiculoId)===String(v.id));
  const pending=evs.filter(e=>e.tipo==='averia'&&e.resuelto!=='SI').length;
  const last=[...evs].sort((a,b)=>String(b.fecha).localeCompare(String(a.fecha)))[0];
  const est=v.estado||'ok';
  return `<div class="veh-card ${est}" onclick="navigate('vehicles','${v.id}')">
    <div class="veh-header">
      <div><div class="veh-name">${v.nombre}</div><div class="veh-patent">${v.patente||'—'}</div></div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        <span style="font-size:22px">${VT[v.tipo]||'🚗'}</span>
        <span class="badge ${ST[est].cls}">${ST[est].label}</span>
      </div>
    </div>
    ${pending>0?`<div style="background:var(--red-dim);border:1px solid rgba(255,82,82,.2);border-radius:var(--r);padding:6px 10px;font-size:12px;color:var(--red);margin-bottom:8px">⚠ ${pending} avería${pending>1?'s':''} pendiente${pending>1?'s':''}</div>`:''}
    <div class="veh-stats">
      <div><div class="stat-lbl">Kilometraje</div><div class="stat-val">${fmtKm(v.km)}</div></div>
      <div><div class="stat-lbl">Año</div><div class="stat-val">${v.anio||'—'}</div></div>
      <div><div class="stat-lbl">Registros</div><div class="stat-val">${evs.length}</div></div>
      <div><div class="stat-lbl">Último evento</div><div class="stat-val" style="font-size:11px">${last?fmtDate(last.fecha):'—'}</div></div>
    </div>
  </div>`;
}

// ── Events ────────────────────────────────────────────────────
function renderEvents(el){
  if(!API_URL){el.innerHTML=notConfigured();return;}
  const evs=[...S.events].sort((a,b)=>String(b.fecha).localeCompare(String(a.fecha)));
  if(!evs.length){el.innerHTML=`<div class="empty"><div class="empty-title">Sin registros</div>Agregá el primero desde un vehículo o con "+ Registro"</div>`;return;}
  el.innerHTML=`
    <div class="filter-bar">
      <input id="f-search" placeholder="Buscar..." oninput="filterEvents()">
      <select id="f-type" onchange="filterEvents()"><option value="">Todos los tipos</option>${Object.entries(ET).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join('')}</select>
      <select id="f-veh" onchange="filterEvents()"><option value="">Todos los vehículos</option>${S.vehicles.map(v=>`<option value="${v.id}">${v.nombre}</option>`).join('')}</select>
      <select id="f-state" onchange="filterEvents()"><option value="">Todos</option><option value="pending">Solo pendientes</option><option value="resolved">Solo resueltos</option></select>
    </div>
    <div class="table-wrap" id="events-table">${eventsTable(evs)}</div>`;
}

function filterEvents(){
  const q=document.getElementById('f-search')?.value.toLowerCase()||'';
  const type=document.getElementById('f-type')?.value||'';
  const veh=document.getElementById('f-veh')?.value||'';
  const state=document.getElementById('f-state')?.value||'';
  let evs=[...S.events].sort((a,b)=>String(b.fecha).localeCompare(String(a.fecha)));
  if(q)evs=evs.filter(e=>(e.descripcion||'').toLowerCase().includes(q)||(e.tipo||'').includes(q));
  if(type)evs=evs.filter(e=>e.tipo===type);
  if(veh)evs=evs.filter(e=>String(e.vehiculoId)===veh);
  if(state==='pending')evs=evs.filter(e=>e.tipo==='averia'&&e.resuelto!=='SI');
  if(state==='resolved')evs=evs.filter(e=>e.resuelto==='SI');
  document.getElementById('events-table').innerHTML=eventsTable(evs);
}

function eventsTable(evs){
  if(!evs.length)return`<div class="empty" style="padding:32px"><div class="empty-title">Sin resultados</div></div>`;
  return`<table><thead><tr><th>Fecha</th><th>Vehículo</th><th>Tipo</th><th>Descripción</th><th>km</th><th>Estado</th><th></th></tr></thead>
    <tbody>${evs.map(ev=>{
      const v=S.vehicles.find(x=>String(x.id)===String(ev.vehiculoId));
      const et=ET[ev.tipo]||ET.km;
      const resolved=ev.resuelto==='SI';
      return`<tr>
        <td class="td-mono">${fmtDate(ev.fecha)}</td>
        <td style="cursor:pointer" onclick="navigate('vehicles','${ev.vehiculoId}')">${v?v.nombre:'—'}</td>
        <td><span class="badge ${et.bc}">${et.label}</span></td>
        <td style="max-width:200px;color:var(--text2)">${ev.descripcion||'—'}</td>
        <td class="td-mono">${fmtKm(ev.km)}</td>
        <td>${ev.tipo==='averia'?`<span class="badge ${resolved?'badge-ok':'badge-bad'}">${resolved?'Resuelto':'Pendiente'}</span>`:'<span style="color:var(--text3)">—</span>'}</td>
        <td style="display:flex;gap:6px;align-items:center">
          <button class="btn btn-sm" onclick="openEventModal('${ev.id}')">✎</button>
          ${ev.tipo==='averia'&&!resolved?`<button class="btn btn-sm btn-primary" onclick="resolveEvent('${ev.id}')">✓</button>`:''}
        </td>
      </tr>`;
    }).join('')}</tbody></table>`;
}

        <div class="dstat"><div class="stat-lbl">Último evento</div><div class="stat-val" style="font-size:11px">${last?fmtDate(last.fecha):'—'}</div></div>
      </div>
    </div>
    ${pending>0?`<div class="alert alert-warn">⚠ ${pending} avería${pending>1?'s':''} pendiente${pending>1?'s':''}. Revisá el historial.</div>`:''}

      <select id="tl-filter" onchange="renderTimeline()" style="width:auto;font-size:11px;padding:4px 8px">

function renderTimeline(){
  const f=document.getElementById('tl-filter')?.value||'';
  const evs=[...S.events.filter(e=>String(e.vehiculoId)===String(S.detail)&&(!f||e.tipo===f))].sort((a,b)=>String(b.fecha).localeCompare(String(a.fecha)));
  document.getElementById('timeline-wrap').innerHTML=buildTimeline(evs);
}

function buildTimeline(evs){
  if(!evs.length)return`<div class="empty" style="padding:32px"><div class="empty-title">Sin registros</div>Usá "+ Registro" para agregar el primero</div>`;
  return evs.map(ev=>{
    const et=ET[ev.tipo]||ET.km;
    const resolved=ev.resuelto==='SI';
    return`<div class="tl-item">
      <div class="tl-dot" style="background:${et.color}"></div>
      <div class="tl-content">
        <div class="tl-meta">
          <span class="badge ${et.bc}">${et.label}</span>
          <span class="tl-date">${fmtDate(ev.fecha)}</span>
          ${ev.km?`<span class="tl-date">${fmtKm(ev.km)}</span>`:''}
          ${ev.tipo==='averia'?`<span class="badge ${resolved?'badge-ok':'badge-bad'}">${resolved?'Resuelto':'Pendiente'}</span>`:''}
          ${ev.fechaResolucion&&resolved?`<span class="tl-date">→ resuelto ${fmtDate(ev.fechaResolucion)}</span>`:''}
        </div>
        <div class="tl-desc">${ev.descripcion||'—'}</div>
        <div class="tl-actions">
          <button class="btn btn-sm" onclick="openEventModal('${ev.id}')">Editar</button>
          ${ev.tipo==='averia'&&!resolved?`<button class="btn btn-sm btn-primary" onclick="resolveEvent('${ev.id}')">Marcar resuelto</button>`:''}
          <button class="btn btn-sm btn-danger" onclick="deleteEventConfirm('${ev.id}')">Eliminar</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Dashboard ─────────────────────────────────────────────────
function renderDashboard(el){
  if(!API_URL){el.innerHTML=notConfigured();return;}
  const total=S.vehicles.length;
  const pending=S.events.filter(e=>e.tipo==='averia'&&e.resuelto!=='SI').length;
  const now=new Date();
  const thisMonth=S.events.filter(e=>{const d=new Date(e.fecha);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).length;
  const maxKm=total?Math.max(...S.vehicles.map(v=>Number(v.km)||0),1):1;
  const byType={};S.events.forEach(e=>{byType[e.tipo]=(byType[e.tipo]||0)+1;});
  const maxN=Math.max(...Object.values(byType),1);
  const urgent=S.vehicles.filter(v=>v.estado==='bad').length;
  const attn=S.vehicles.filter(v=>v.estado==='warn').length;

  el.innerHTML=`
    <div class="stats-grid">
      <div class="scard"><div class="scard-lbl">Flota total</div><div class="scard-val">${total}</div><div class="scard-sub">vehículos</div></div>
      <div class="scard"><div class="scard-lbl">Averías activas</div><div class="scard-val" style="color:${pending>0?'var(--red)':'var(--accent)'}">${pending}</div><div class="scard-sub">sin resolver</div></div>
      <div class="scard"><div class="scard-lbl">Eventos este mes</div><div class="scard-val">${thisMonth}</div><div class="scard-sub">registros</div></div>
      <div class="scard"><div class="scard-lbl">Total registros</div><div class="scard-val">${S.events.length}</div><div class="scard-sub">histórico</div></div>
    </div>
    ${urgent>0||attn>0?`<div class="alert alert-warn">${urgent>0?`⚠ ${urgent} vehículo${urgent>1?'s':''} en estado URGENTE. `:''} ${attn>0?`${attn} vehículo${attn>1?'s':''} requieren atención.`:''}</div>`:''}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
      <div class="bar-chart">
        <div class="section-label" style="margin-bottom:14px">Kilometraje por vehículo</div>
        ${S.vehicles.length?[...S.vehicles].sort((a,b)=>(Number(b.km)||0)-(Number(a.km)||0)).map(v=>`
          <div class="bar-row">
            <span class="bar-label">${v.nombre}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round((Number(v.km)||0)/maxKm*100)}%;background:var(--accent)"></div></div>
            <span class="bar-val">${fmtKm(v.km)}</span>
          </div>`).join(''):`<div class="empty" style="padding:16px 0">Sin datos</div>`}
      </div>
      <div class="bar-chart">
        <div class="section-label" style="margin-bottom:14px">Registros por tipo</div>
        ${Object.entries(ET).map(([k,v])=>{const n=byType[k]||0;return`
          <div class="bar-row">
            <span class="bar-label">${v.label}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(n/maxN*100)}%;background:${v.color}"></div></div>
            <span class="bar-val">${n}</span>
          </div>`;}).join('')}
      </div>
    </div>
    ${pending>0?`
      <div class="section-hdr"><span class="section-label">Averías pendientes</span></div>
      <div class="table-wrap"><table>
        <thead><tr><th>Vehículo</th><th>Fecha</th><th>Descripción</th><th></th></tr></thead>
        <tbody>${S.events.filter(e=>e.tipo==='averia'&&e.resuelto!=='SI').map(ev=>{
          const v=S.vehicles.find(x=>String(x.id)===String(ev.vehiculoId));
          return`<tr>
            <td style="cursor:pointer" onclick="navigate('vehicles','${ev.vehiculoId}')">${v?v.nombre:'—'}</td>
            <td class="td-mono">${fmtDate(ev.fecha)}</td>
            <td style="color:var(--text2)">${ev.descripcion||'—'}</td>
            <td><button class="btn btn-sm btn-primary" onclick="resolveEvent('${ev.id}')">✓ Resolver</button></td>

}

async function saveVehicle(id){
  const nombre=document.getElementById('m-nombre').value.trim();
  if(!nombre){toast('Ingresá un nombre','error');return;}
  const data={nombre,patente:document.getElementById('m-patente').value.trim(),anio:document.getElementById('m-anio').value,tipo:document.getElementById('m-tipo').value,km:Number(document.getElementById('m-km').value)||0,estado:document.getElementById('m-estado').value,notas:document.getElementById('m-notas').value.trim()};
  closeModal();
  if(id){data.id=id;await api({action:'editVehicle',data:JSON.stringify(data)});}
  else{await api({action:'addVehicle',data:JSON.stringify(data)});}
  toast(id?'Vehículo actualizado':'Vehículo agregado');
  await loadAll();
}

async function deleteVehicleConfirm(id){
  if(!confirm('¿Eliminar este vehículo y todos sus registros? Esta acción no se puede deshacer.'))return;
  closeModal();
  await api({action:'deleteVehicle',id});
  toast('Vehículo eliminado');
  await loadAll();
  navigate('vehicles');
}

function openEventModal(id,vid){
  const ev=id?S.events.find(e=>String(e.id)===String(id)):null;
  const preVid=vid||(ev?ev.vehiculoId:'')||(S.detail||'');
  showModal(`
    <div class="modal-header"><span class="modal-title">${ev?'Editar registro':'Nuevo registro'}</span><button class="btn btn-sm" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="form-row"><label>Vehículo</label><select id="m-vid">${S.vehicles.map(v=>`<option value="${v.id}" ${String(v.id)===String(preVid)?'selected':''}>${v.nombre} (${v.patente||'—'})</option>`).join('')}</select></div>
      <div class="form-row-2">
        <div><label>Tipo</label><select id="m-etipo" onchange="toggleResolved()">${Object.entries(ET).map(([k,v])=>`<option value="${k}" ${ev&&ev.tipo===k?'selected':''}>${v.label}</option>`).join('')}</select></div>
        <div><label>Fecha</label><input id="m-fecha" type="date" value="${ev?ev.fecha:today()}"></div>
      </div>
      <div class="form-row"><label>Kilometraje al momento</label><input id="m-km" type="number" value="${ev?ev.km||0:0}"></div>
      <div class="form-row"><label>Descripción</label><textarea id="m-desc" placeholder="Detalles del evento...">${ev?esc(ev.descripcion||''):''}</textarea></div>
      <div id="m-resolved-wrap">
        <div class="divider"></div>
        <div class="check-row"><input type="checkbox" id="m-resolved" ${ev&&ev.resuelto==='SI'?'checked':''}><label for="m-resolved">Avería resuelta</label></div>
        <div id="m-resdate-wrap"><label>Fecha de resolución</label><input id="m-resdate" type="date" value="${ev&&ev.fechaResolucion?ev.fechaResolucion:today()}"></div>
      </div>
    </div>
    <div class="modal-footer">
      ${ev?`<button class="btn btn-danger" onclick="deleteEventConfirm('${ev.id}')">Eliminar</button>`:''}
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveEvent('${ev?ev.id:''}')">Guardar</button>
    </div>`);
  toggleResolved();
  document.getElementById('m-resolved')?.addEventListener('change',function(){document.getElementById('m-resdate-wrap').style.display=this.checked?'':'none';});
}

function toggleResolved(){
  const tipo=document.getElementById('m-etipo')?.value;
  const wrap=document.getElementById('m-resolved-wrap');
  if(wrap)wrap.style.display=tipo==='averia'?'':'none';
}

async function saveEvent(id){
  const vid=document.getElementById('m-vid').value;
  if(!vid){toast('Seleccioná un vehículo','error');return;}
  const desc=document.getElementById('m-desc').value.trim();
  if(!desc){toast('Ingresá una descripción','error');return;}
  const tipo=document.getElementById('m-etipo').value;
  const resolved=tipo==='averia'?document.getElementById('m-resolved').checked:true;
  const data={vehiculoId:vid,tipo,fecha:document.getElementById('m-fecha').value,km:Number(document.getElementById('m-km').value)||0,descripcion:desc,resuelto:resolved?'SI':'NO',fechaResolucion:resolved?(document.getElementById('m-resdate')?.value||''):''};
  closeModal();
  if(id){data.id=id;await api({action:'editEvent',data:JSON.stringify(data)});}
  else{await api({action:'addEvent',data:JSON.stringify(data)});}
  toast(id?'Registro actualizado':'Registro guardado');
  await loadAll();
}

async function deleteEventConfirm(id){
  if(!confirm('¿Eliminar este registro?'))return;
  closeModal();
  await api({action:'deleteEvent',id});
  toast('Registro eliminado');
  await loadAll();
}

async function resolveEvent(id){
  const ev=S.events.find(e=>String(e.id)===String(id));
  if(!ev)return;
  const data={...ev,resuelto:'SI',fechaResolucion:today()};
  await api({action:'editEvent',data:JSON.stringify(data)});
  toast('Avería marcada como resuelta');
  await loadAll();
}

function showModal(html){document.getElementById('modal-root').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`;}
function closeModal(){document.getElementById('modal-root').innerHTML='';}

function fmtKm(n){return n?Number(n).toLocaleString('es-AR')+' km':'—';}
function fmtDate(d){if(!d)return'—';try{return new Date(d+'T12:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'});}catch{return d;}}
function today(){return new Date().toISOString().slice(0,10);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
